# nginx proxy address - http://172.17.0.1:59076

name: matrix
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  web:
    image: vectorim/element-web:latest
    container_name: matrix-web
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: matrix-web
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - 172.17.0.1:59076:80
    volumes:
      - './volumes/config/element/config.json:/app/config.json:ro'
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - matrix
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://matrix-web:80'
      - 'cloudflare.hostname=matrix.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.matrix-web.entrypoints=http'
      - 'traefik.http.routers.matrix-web-secure.tls=true'
      - 'traefik.http.routers.matrix-web.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.matrix-web-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.matrix-web.middlewares=matrix-web-https-redirect'
      - 'traefik.http.routers.matrix-web-secure.entrypoints=https'
      - 'traefik.http.routers.matrix-web-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.matrix-web-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.matrix-web-secure.service=matrix-web'
      - 'traefik.http.services.matrix-web.loadbalancer.server.port=80'

  server:
    image: docker.io/matrixdotorg/synapse:latest
    container_name: matrix-server
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: matrix-server
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS:-no}
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      SYNAPSE_SERVER_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      SYNAPSE_LOG_LEVEL: ${SYNAPSE_LOG_LEVEL:-WARNING}
    ports:
      - 172.17.0.1:8008:8008
      - 8448:8448
    volumes:
      - './volumes/config/synapse:/data'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrix
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://matrix-server:8008'
      - 'cloudflare.hostname=matrix.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.matrix-server.entrypoints=http'
      - 'traefik.http.routers.matrix-server-secure.tls=true'
      - 'traefik.http.routers.matrix-server.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.matrix-server-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.matrix-server.middlewares=matrix-server-https-redirect'
      - 'traefik.http.routers.matrix-server-secure.entrypoints=https'
      - 'traefik.http.routers.matrix-server-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.matrix-server-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.matrix-server-secure.service=matrix-server'
      - 'traefik.http.services.matrix-server.loadbalancer.server.port=8008'

  db:
    image: postgres:latest
    container_name: matrix-db
    hostname: matrix-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: matrix-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-synapse}
      POSTGRES_USER: ${DB_USER_NAME:-synapse}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - './volumes/data/db/postgres/matrix:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - matrix

networks:
  matrix:
    name: matrix
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
